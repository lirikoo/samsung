<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoción Lavadora - Molineros</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8; /* Fondo claro general */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* Contenedor Principal (Tarjeta Blanca) */
        .promo-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Cabecera */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .promo-title {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .promo-title .ribbon {
            background-color: #da291c;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 5px;
            font-size: 1.2rem;
            transform: rotate(-2deg);
        }

        .promo-title .rojo { color: #da291c; }
        .promo-title .amarillo { color: #f2a900; font-size: 2.5rem;}

        .logo-container {
            text-align: right;
        }

        .logo-container h2 {
            color: #da291c;
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .logo-container p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
        }

        /* Contenido Principal a dos columnas */
        .main-content {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Columna Izquierda: Información */
        .info-col {
            flex: 1;
            min-width: 300px;
        }

        .brand {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 0 0 5px 0;
        }

        .sku {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .price-label {
            color: #da291c;
            font-weight: bold;
            font-size: 1rem;
            margin: 0;
        }

        .price {
            color: #da291c;
            font-size: 5rem;
            font-weight: 900;
            margin: -10px 0 20px 0;
            line-height: 1;
        }

        /* Sección de Regalo */
        .gift-section {
            display: flex;
            align-items: center;
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #da291c;
            margin-top: 20px;
        }

        .gift-img {
            width: 80px;
            height: auto;
            margin-right: 15px;
        }

        .gift-text h4 {
            color: #da291c;
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .gift-text p {
            margin: 0;
            font-size: 0.85rem;
            font-weight: bold;
            color: #333;
        }

        /* Columna Derecha: Imagen del Producto */
        .image-col {
            flex: 1;
            min-width: 300px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-img {
            max-width: 100%;
            height: auto;
        }

        /* Etiqueta de Capacidad (44 LB) */
        .capacity-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #da291c;
            color: white;
            padding: 15px 10px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 5px;
            text-align: center;
            line-height: 1;
        }

        /* Responsividad para móviles */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .logo-container {
                text-align: left;
            }
            .main-content {
                flex-direction: column-reverse;
            }
        }
    </style>
</head>
<body>

    <div class="promo-card">
        
        <div class="header">
            <div class="promo-title">
                <div class="ribbon">Este agosto</div><br>
                Lo <span class="rojo">decidís</span><br>
                <span class="amarillo">vos</span>
            </div>
            <div class="logo-container">
                <h2>MOLINEROS</h2>
                <p>El amigo de su Hogar</p>
            </div>
        </div>

        <div class="main-content">
            
            <div class="info-col">
                <h1 class="brand">SAMSUNG</h1>
                <div class="sku">SKU 12770/13044/13058</div>
                <div class="product-name">
                    LAVADORA<br>
                    WF20T6000AW BLC
                </div>
                
                <p class="price-label">MOLICUOTA DESDE:</p>
                <div class="price">L227</div>

                <div class="gift-section">
                    <img src="https://via.placeholder.com/100x80?text=Microondas" alt="Regalo" class="gift-img">
                    <div class="gift-text">
                        <h4>¡REGALO!</h4>
                        <p>MICRO ECOTECH + SOPORTE D/LAVADORA<br>AL CRÉDITO</p>
                    </div>
                </div>
            </div>

            <div class="image-col">
                <img src="https://via.placeholder.com/350x400?text=Lavadora+Samsung" alt="Lavadora Samsung" class="product-img">
                <div class="capacity-badge">
                    44<br>LB
                </div>
            </div>

        </div>

    </div>

</body>
</html>
